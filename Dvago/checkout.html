<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - DVAGO</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .checkout-page {
            padding: 2rem 0;
        }

        .checkout-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .checkout-grid {
                grid-template-columns: 1.5fr 1fr;
            }
        }

        .checkout-section {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.875rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        @media (min-width: 640px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        .error {
            color: var(--destructive);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        .order-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item-image {
            width: 60px;
            height: 60px;
            flex-shrink: 0;
        }

        .order-item-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .order-item-details {
            flex: 1;
        }

        .order-item-name {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .order-item-qty {
            font-size: 0.75rem;
            color: var(--muted-foreground);
        }

        .order-item-price {
            font-weight: 600;
            color: var(--primary);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
        }

        .summary-total {
            font-size: 1.125rem;
            font-weight: 700;
            padding-top: 0.75rem;
            border-top: 2px solid var(--border);
        }

        .place-order-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border-radius: var(--radius);
            font-weight: 600;
            margin-top: 1.5rem;
            font-size: 1rem;
        }

        .payment-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 0.75rem;
            cursor: pointer;
        }

        .payment-option input[type="radio"] {
            width: 1.25rem;
            height: 1.25rem;
        }

        .payment-option.selected {
            border-color: var(--primary);
            background: rgba(130, 179, 102, 0.05);
        }
    </style>
</head>

<body>
    <header class="header sticky">
        <div class="announcement-bar">
            <div class="announcement-ticker">
                <span>Welcome to DVAGO.pk. For calling and WhatsApp, please use 021-11-11-38246.</span>
            </div>
        </div>
        <div class="top-header container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">
                        <h1>D<span class="logo-v">V</span>AGO</h1>
                        <p class="logo-subtitle">Pharmacy & Wellness Experts</p>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="checkout-page">
            <div class="checkout-container">
                <h1 style="font-size: 2rem; margin-bottom: 1.5rem; color: var(--primary);">Checkout</h1>

                <div class="checkout-grid">
                    <div>
                        <!-- Billing Information -->
                        <div class="checkout-section">
                            <h2 class="section-title">Billing Information</h2>
                            <form id="checkoutForm">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">First Name *</label>
                                        <input type="text" class="form-input" id="firstName" required>
                                        <div class="error" id="firstNameError"></div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Last Name *</label>
                                        <input type="text" class="form-input" id="lastName" required>
                                        <div class="error" id="lastNameError"></div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Email *</label>
                                    <input type="email" class="form-input" id="email" required>
                                    <div class="error" id="emailError"></div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Phone Number *</label>
                                    <input type="tel" class="form-input" id="phone" required>
                                    <div class="error" id="phoneError"></div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Address *</label>
                                    <input type="text" class="form-input" id="address" required>
                                    <div class="error" id="addressError"></div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">City *</label>
                                        <input type="text" class="form-input" id="city" required>
                                        <div class="error" id="cityError"></div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Postal Code</label>
                                        <input type="text" class="form-input" id="postalCode">
                                    </div>
                                </div>
                            </form>
                        </div>

                        <!-- Payment Method -->
                        <div class="checkout-section" style="margin-top: 1.5rem;">
                            <h2 class="section-title">Payment Method</h2>
                            <div class="payment-option selected" onclick="selectPayment('cod')">
                                <input type="radio" name="payment" value="cod" checked>
                                <div>
                                    <div style="font-weight: 600;">Cash on Delivery</div>
                                    <div style="font-size: 0.75rem; color: var(--muted-foreground);">Pay when you
                                        receive</div>
                                </div>
                            </div>
                            <div class="payment-option" onclick="selectPayment('card')">
                                <input type="radio" name="payment" value="card">
                                <div>
                                    <div style="font-weight: 600;">Credit/Debit Card</div>
                                    <div style="font-size: 0.75rem; color: var(--muted-foreground);">Pay securely online
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Order Summary -->
                    <div>
                        <div class="checkout-section">
                            <h2 class="section-title">Order Summary</h2>
                            <div id="orderItems"></div>
                            <div style="margin-top: 1.5rem;">
                                <div class="summary-row">
                                    <span>Subtotal</span>
                                    <span id="summarySubtotal">Rs. 0</span>
                                </div>
                                <div class="summary-row">
                                    <span>Shipping</span>
                                    <span id="summaryShipping">Rs. 0</span>
                                </div>
                                <div class="summary-row summary-total">
                                    <span>Total</span>
                                    <span id="summaryTotal">Rs. 0</span>
                                </div>
                            </div>
                            <button class="place-order-btn" onclick="placeOrder()">Place Order</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="products-data.js"></script>
    <script src="cart.js"></script>
    <script>
        function renderOrderSummary() {
            const cartItems = cart.getCart();
            if (cartItems.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            const subtotal = cart.getSubtotal();
            const shipping = subtotal >= 5000 ? 0 : 200;
            const total = cart.getTotal(shipping);

            document.getElementById('orderItems').innerHTML = cartItems.map(item => `
                <div class="order-item">
                    <div class="order-item-image">
                        <img src="${item.image}" alt="${item.name}">
                    </div>
                    <div class="order-item-details">
                        <div class="order-item-name">${item.name}</div>
                        <div class="order-item-qty">Qty: ${item.quantity}</div>
                    </div>
                    <div class="order-item-price">Rs. ${(item.price * item.quantity).toLocaleString()}</div>
                </div>
            `).join('');

            document.getElementById('summarySubtotal').textContent = `Rs. ${subtotal.toLocaleString()}`;
            document.getElementById('summaryShipping').textContent = shipping === 0 ? 'FREE' : `Rs. ${shipping.toLocaleString()}`;
            document.getElementById('summaryTotal').textContent = `Rs. ${total.toLocaleString()}`;
        }

        function selectPayment(method) {
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.querySelector(`input[value="${method}"]`).checked = true;
        }

        function validateForm() {
            let isValid = true;
            const fields = ['firstName', 'lastName', 'email', 'phone', 'address', 'city'];

            fields.forEach(field => {
                const input = document.getElementById(field);
                const error = document.getElementById(field + 'Error');
                if (!input.value.trim()) {
                    error.textContent = 'This field is required';
                    isValid = false;
                } else {
                    error.textContent = '';
                }
            });

            const email = document.getElementById('email');
            const emailError = document.getElementById('emailError');
            if (email.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                emailError.textContent = 'Please enter a valid email';
                isValid = false;
            }

            const phone = document.getElementById('phone');
            const phoneError = document.getElementById('phoneError');
            if (phone.value && !/^[0-9]{10,11}$/.test(phone.value.replace(/[-\s]/g, ''))) {
                phoneError.textContent = 'Please enter a valid phone number';
                isValid = false;
            }

            return isValid;
        }

        function placeOrder() {
            if (!validateForm()) {
                alert('Please fill in all required fields correctly');
                return;
            }

            const orderData = {
                customer: {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    postalCode: document.getElementById('postalCode').value
                },
                items: cart.getCart(),
                payment: document.querySelector('input[name="payment"]:checked').value,
                total: cart.getTotal(cart.getSubtotal() >= 5000 ? 0 : 200),
                orderDate: new Date().toISOString()
            };

            localStorage.setItem('lastOrder', JSON.stringify(orderData));
            cart.clearCart();
            window.location.href = 'order-confirmation.html';
        }

        document.addEventListener('DOMContentLoaded', renderOrderSummary);
    </script>
</body>

</html>
