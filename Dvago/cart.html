<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - DVAGO</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .cart-page {
            padding: 2rem 0;
        }

        .cart-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .cart-empty {
            text-align: center;
            padding: 3rem;
        }

        .cart-empty svg {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            color: var(--muted-foreground);
        }

        .cart-items {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-image {
            width: 100px;
            height: 100px;
            flex-shrink: 0;
        }

        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 600;
        }

        .cart-item-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-top: 0.75rem;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .quantity-btn {
            padding: 0.5rem;
            background: none;
            cursor: pointer;
        }

        .quantity-value {
            padding: 0 1rem;
        }

        .remove-btn {
            color: var(--destructive);
            font-size: 0.875rem;
            cursor: pointer;
        }

        .cart-summary {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .summary-total {
            font-size: 1.25rem;
            font-weight: 700;
            padding-top: 0.75rem;
            border-top: 2px solid var(--border);
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border-radius: var(--radius);
            font-weight: 600;
            margin-top: 1rem;
        }

        @media (max-width: 640px) {
            .cart-item {
                flex-direction: column;
            }

            .cart-item-image {
                width: 100%;
                height: 150px;
            }
        }
    </style>
</head>

<body>
    <header class="header sticky">
        <div class="announcement-bar">
            <div class="announcement-ticker">
                <span>Welcome to DVAGO.pk. For calling and WhatsApp, please use 021-11-11-38246.</span>
            </div>
        </div>
        <div class="top-header container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">
                        <h1>D<span class="logo-v">V</span>AGO</h1>
                        <p class="logo-subtitle">Pharmacy & Wellness Experts</p>
                    </a>
                </div>
                <div class="header-icons">
                    <a href="index.html"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        </svg></a>
                    <a href="products.html"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg></a>
                    <a href="cart.html">
                        <div class="cart-wrapper">
                            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                            <span class="cart-badge">0</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="cart-page">
            <div class="cart-container">
                <h1 style="font-size: 2rem; margin-bottom: 1.5rem; color: var(--primary);">Shopping Cart</h1>

                <div id="cartContent">
                    <!-- Cart content will be loaded here -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2024 DVAGO. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="products-data.js"></script>
    <script src="cart.js"></script>
    <script>
        function renderCart() {
            const cartContent = document.getElementById('cartContent');
            const cartItems = cart.getCart();

            if (cartItems.length === 0) {
                cartContent.innerHTML = `
                    <div class="cart-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <h2>Your cart is empty</h2>
                        <p style="color: var(--muted-foreground); margin-bottom: 1.5rem;">Add some products to get started!</p>
                        <a href="products.html" class="btn-primary" style="display: inline-block; padding: 0.75rem 2rem;">Continue Shopping</a>
                    </div>
                `;
                return;
            }

            const subtotal = cart.getSubtotal();
            const shipping = subtotal >= 5000 ? 0 : 200;
            const total = cart.getTotal(shipping);

            cartContent.innerHTML = `
                <div class="cart-items">
                    ${cartItems.map(item => `
                        <div class="cart-item">
                            <div class="cart-item-image">
                                <img src="${item.image}" alt="${item.name}">
                            </div>
                            <div class="cart-item-details">
                                <h3 class="cart-item-name">${item.name}</h3>
                                <p class="cart-item-price">Rs. ${item.price.toLocaleString()}</p>
                                <div class="cart-item-actions">
                                    <div class="quantity-control">
                                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">−</button>
                                        <span class="quantity-value">${item.quantity}</span>
                                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                                    </div>
                                    <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
                                </div>
                            </div>
                            <div style="font-weight: 600; color: var(--primary);">
                                Rs. ${(item.price * item.quantity).toLocaleString()}
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="cart-summary">
                    <h3 style="margin-bottom: 1rem;">Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>Rs. ${subtotal.toLocaleString()}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>${shipping === 0 ? 'FREE' : 'Rs. ' + shipping.toLocaleString()}</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span>Rs. ${total.toLocaleString()}</span>
                    </div>
                    <button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
                    <a href="products.html" style="display: block; text-align: center; margin-top: 1rem; color: var(--primary);">Continue Shopping</a>
                </div>
            `;
        }

        function updateQuantity(id, qty) {
            cart.updateQuantity(id, qty);
            renderCart();
        }

        function removeItem(id) {
            cart.removeFromCart(id);
            renderCart();
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>

</html>
