<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - DVAGO</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .confirmation-page {
            padding: 3rem 0;
            min-height: 60vh;
            display: flex;
            align-items: center;
        }

        .confirmation-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 1rem;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            color: var(--primary);
        }

        .confirmation-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .confirmation-text {
            color: var(--muted-foreground);
            margin-bottom: 2rem;
        }

        .order-details {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: left;
            margin-bottom: 2rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--muted-foreground);
        }

        .detail-value {
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 2rem;
            border-radius: var(--radius);
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary-link {
            background: var(--primary);
            color: white;
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
    </style>
</head>

<body>
    <header class="header sticky">
        <div class="announcement-bar">
            <div class="announcement-ticker">
                <span>Welcome to DVAGO.pk. For calling and WhatsApp, please use 021-11-11-38246.</span>
            </div>
        </div>
        <div class="top-header container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">
                        <h1>D<span class="logo-v">V</span>AGO</h1>
                        <p class="logo-subtitle">Pharmacy & Wellness Experts</p>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="confirmation-page">
            <div class="confirmation-container">
                <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>

                <h1 class="confirmation-title">Order Confirmed!</h1>
                <p class="confirmation-text">Thank you for your order. We've received your order and will process it
                    shortly.</p>

                <div class="order-details" id="orderDetails">
                    <!-- Order details will be loaded here -->
                </div>

                <div class="action-buttons">
                    <a href="products.html" class="btn btn-primary-link">Continue Shopping</a>
                    <a href="index.html" class="btn btn-secondary">Back to Home</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2024 DVAGO. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lastOrder = localStorage.getItem('lastOrder');
            if (!lastOrder) {
                window.location.href = 'index.html';
                return;
            }

            const order = JSON.parse(lastOrder);
            const orderNumber = 'DV' + Date.now().toString().slice(-8);
            const orderDate = new Date(order.orderDate).toLocaleDateString('en-PK', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            const estimatedDelivery = new Date(order.orderDate);
            estimatedDelivery.setDate(estimatedDelivery.getDate() + 3);
            const deliveryDate = estimatedDelivery.toLocaleDateString('en-PK', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            document.getElementById('orderDetails').innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">Order Number</span>
                    <span class="detail-value">${orderNumber}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Order Date</span>
                    <span class="detail-value">${orderDate}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Total Amount</span>
                    <span class="detail-value">Rs. ${order.total.toLocaleString()}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Payment Method</span>
                    <span class="detail-value">${order.payment === 'cod' ? 'Cash on Delivery' : 'Credit/Debit Card'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Estimated Delivery</span>
                    <span class="detail-value">${deliveryDate}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Delivery Address</span>
                    <span class="detail-value">${order.customer.address}, ${order.customer.city}</span>
                </div>
            `;
        });
    </script>
</body>

</html>
